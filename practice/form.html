<!-- form in bootstrap -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <br />
    <form>
      <div class="container">
        <div class="row">
          <div class="col-sm-6 mb-3">
            <label for="email" class="form-label">Email address : </label>
            <input
              type="email"
              name="email"
              id="email"
              class="form-control"
              placeholder="Enter your email "
            />
          </div>
          <div class="col-sm-6 mb-3">
            <label for="user" class="form-label">User name : </label>
            <input
              type="text"
              name="user"
              id="user"
              class="form-control"
              placeholder="Enter your username "
            />
          </div>
        </div>
        <div class="form-check mb-3">
          <input
            type="checkbox"
            name="sub"
            id="sub1"
            class="form-check-input"
            checked
          />
          <label for="sub1" class="form-check-label">Ben</label>
        </div>
        <div class="form-check mb-3">
          <input
            type="checkbox"
            name="sub"
            id="sub2"
            class="form-check-input"
          />
          <label for="sub2" class="form-check-label">Eng</label>
        </div>
        <div class="row">
          <div class="col-sm-6 mb-3">
            <select name="car" id="car" class="form-select">
              <option selected>Select your car</option>
              <option value="bmw">BMW</option>
              <option value="tata">Tata</option>
            </select>
          </div>
        </div>
        <div class="form-check">
          <input
            type="radio"
            name="class"
            id="class1"
            class="form-check-input"
            checked
          />
          <label for="class1" class="form-check-label">XI</label>
        </div>
        <div class="form-check">
          <input
            type="radio"
            name="class"
            id="class2"
            class="form-check-input"
          />
          <label for="class2" class="form-check-label">XII</label>
        </div>
        <div class="form-check form-switch">
          <input
            type="checkbox"
            name="switch1"
            id="switch1"
            class="form-check-input"
            disabled
          />
          <label for="switch1" class="form-check-label">Yes</label>
        </div>
        <div class="form-check form-switch">
          <input
            type="checkbox"
            name="switch1"
            id="switch2"
            class="form-check-input"
            checked
          />
          <label for="switch2" class="form-check-label">No</label>
        </div>
      </div>
    </form>
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
