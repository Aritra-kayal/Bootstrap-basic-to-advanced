<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>
    <link

    />
    <link rel="stylesheet" href="card.css" />

  <body>

          </p>
          <a href="#" class="btn btn-primary">Click me!</a>
        </div>
      </div>
      <div class="card text-center" style="width: 18rem" data-bs-theme="light">

          src="https://www.w3schools.com/bootstrap4/img_avatar3.png"

          <h5 class="card-title">Aritra</h5>
          <h6 class="card-subtitle text-body-secondary">Student</h6>

          </p>

          <a href="#" class="card-link">Click me!</a>

  </body>
</html>
