<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="badge.css" />
  </head>
  <body>
    <button class="btn btn-primary">
      Follow <span class="badge bg-danger">10+</span>
    </button>
    <button class="btn btn-primary">
      Follow <span class="badge bg-danger rounded-pill">10+</span>
    </button>
    <span class="badge bg-danger rounded-pill">new</span>
    <span class="badge bg-danger">new</span>
    <h1>Follow me <span class="badge bg-danger rounded-pill">new</span></h1>
    <button type="button" class="btn btn-primary position-relative">
      Inbox
      <span
        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
      >
        new
        <span class="visually-hidden">unread messages</span>
      </span>
    </button>
    &nbsp; &nbsp; &nbsp; &nbsp;
    <button type="button" class="btn btn-primary position-relative">
      Profile
      <span
        class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle"
      >
        <span class="visually-hidden">New alerts</span>
      </span>
    </button>
    <span class="badge bg-warning rounded-pill myBadge">new</span>
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
